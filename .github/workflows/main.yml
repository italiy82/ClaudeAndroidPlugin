name: Build Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Plugin
        run: cd ClaudeAndroidPlugin && gradle buildPlugin

      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeAndroidPlugin
          path: ClaudeAndroidPlugin/build/distributions/*.zip
